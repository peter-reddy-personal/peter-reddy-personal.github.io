<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Route Picker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      max-width: 1000px;
    }

    h2 {
      margin-top: 40px;
    }

    #rider-container {
      margin-bottom: 20px;
    }

    .rider-row {
      display: grid;
      grid-template-columns: 140px 80px repeat(7, 80px) 40px;
      gap: 6px;
      margin-bottom: 8px;
      align-items: center;
    }

    .rider-row input,
    .rider-row select {
      padding: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    table th, table td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
    }

    table th {
      background: #f0f0f0;
    }

    #calculate-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h1>Route Picker</h1>

  <h2>Riders</h2>

  <div id="rider-container"></div>

  <button id="add-rider-btn">Add Rider</button>

  <br><br>
  <button id="calculate-btn">Calculate Routes</button>

  <h2>Best Routes</h2>
  <table id="best-routes-table">
    <thead>
      <tr>
        <th>Route</th>
        <th>Score</th>
        <th>Length</th>
        <th>Elevation</th>
      </tr>
    </thead>
    <tbody id="best-routes"></tbody>
  </table>

  <h2>Worst Routes</h2>
  <table id="worst-routes-table">
    <thead>
      <tr>
        <th>Route</th>
        <th>Score</th>
        <th>Length</th>
        <th>Elevation</th>
      </tr>
    </thead>
    <tbody id="worst-routes"></tbody>
  </table>

  <script src="app.js"></script>
</body>
</html>
