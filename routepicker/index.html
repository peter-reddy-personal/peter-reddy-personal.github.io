<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RoutePicker</title>
  <link rel="stylesheet" href="styles.css?v=5001">
</head>

<body>

  <header class="app-header">
    <h1>RoutePicker</h1>
  </header>

  <main class="app-main">

    <section class="panel">
      <div id="controls">
        <label class="toggle">
          <input type="checkbox" id="ladder-toggle" checked>
          <span class="slider"></span>
          <span class="toggle-label" id="toggle-text">Ladder routes only</span>
        </label>
      </div>
    </section>


    <section class="panel cls-panel">
      <div class="panel-header">
        <h2>CLS Riders</h2>
        <span id="cls-count" class="rider-count">0 riders</span>
      </div>

      <div class="input-headings">
        <span>Name</span>
        <span>Lik%</span>
        <span>SPR</span>
        <span>PUN</span>
        <span>CLI</span>
        <span>TT</span>
        <span>PUR</span>
        <span>END</span>
      </div>

      <div id="cls-container"></div>

      <button id="add-cls-btn" class="secondary-btn">Add CLS Rider</button>
      <button id="reset-cls-btn" class="secondary-btn">Reset CLS</button>
    </section>

    <section class="panel opp-panel">
      <div class="panel-header">
